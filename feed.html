<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feed - Fatima Youth Federation</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <header class="feed-header">
      <div class="header-brand">
        <svg class="header-cross" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <rect x="42" y="10" width="16" height="80" rx="8" fill="url(#cross-grad)" filter="url(#glow)"/>
          <rect x="20" y="35" width="60" height="16" rx="8" fill="url(#cross-grad)" filter="url(#glow)"/>
          <defs>
            <linearGradient id="cross-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#9d4edd" />
              <stop offset="100%" stop-color="#3c096c" />
            </linearGradient>
            <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="2" result="blur" />
              <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
            </filter>
          </defs>
        </svg>
        <h2 style="font-size: 1.2rem; background: linear-gradient(to right, #e0aaff, #9d4edd); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Fatima Youth</h2>
      </div>
      <div class="user-profile">
        <span id="current-user-display" style="font-weight: 500; color: var(--accent);"></span>
        <button id="logout-btn" class="logout-btn">Log out</button>
      </div>
    </header>

    <main class="feed-main">
      <section class="upload-section">
        <div class="upload-input-group">
          <textarea id="post-text" rows="3" placeholder="Share something with the community..."></textarea>
        </div>
        <div class="preview-container" id="media-preview-container" style="display: none;">
           <!-- Media preview injected here -->
        </div>
        <div class="upload-actions">
          <label class="file-label" for="file-upload">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            Photo/Video
            <input type="file" id="file-upload" accept="image/*,video/*" />
          </label>
          <button id="post-btn" class="post-btn">Post</button>
        </div>
      </section>

      <section class="posts-container" id="posts-container">
        <!-- Posts will be dynamically injected here -->
      </section>
    </main>

    <script type="module" src="/feed.js"></script>
  </body>
</html>
